<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <!-- Background Gradient (For preview, can be transparent in production) -->
    <radialGradient id="bg" cx="50%" cy="58%" r="60%">
      <stop offset="0%" stop-color="#222831" />
      <stop offset="100%" stop-color="#15191e" />
    </radialGradient>

    <!-- ── ANVIL METAL GRADIENTS ── -->
    <!-- Main Body Deep Metal -->
    <linearGradient id="anvilBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#677f98" />
      <stop offset="20%" stop-color="#3d546b" />
      <stop offset="60%" stop-color="#243447" />
      <stop offset="100%" stop-color="#141d26" />
    </linearGradient>

    <linearGradient id="anvilTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4e0ec" />
      <stop offset="100%" stop-color="#8ba2ba" />
    </linearGradient>

    <linearGradient id="anvilBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d546b" />
      <stop offset="100%" stop-color="#141d26" />
    </linearGradient>

    <!-- ── GLOW FILTERS ── -->
    <filter id="coreBlast" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="30" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#05080c" flood-opacity="0.9" />
    </filter>
  </defs>

  <!-- Transparent Background Base -->
  <rect width="600" height="600" fill="transparent" />

  <g transform="translate(300, 310)">

    <!-- ════════ ANVIL (Thick, Dark, Detailed Metal) ════════ -->
    <g filter="url(#dropShadow)">
      
      <!-- Base Plate (Bottom back) -->
      <path d="M -100 135 L 100 135 L 115 160 L -115 160 Z" fill="url(#anvilBase)" />
      
      <!-- Main Anvil Body -->
      <path d="M -260 0 
               L 220 0
               C 260 0, 280 20, 280 40 
               C 280 45, 230 75, 170 80
               C 120 85, 100 105, 100 145
               L -100 145
               C -100 105, -120 85, -170 80
               C -230 75, -280 40, -280 10 
               C -280 -5, -270 0, -260 0 Z" 
            fill="url(#anvilBody)" />

      <!-- Bright Crisp Top Strike Plate -->
      <path d="M -265 -8 L 225 -8 C 230 -8, 230 -2, 225 0 L -265 0 Z" fill="url(#anvilTop)" />
      
      <!-- Horizontal glowing crack/seam inside top plate -->
      <rect x="-180" y="-3" width="360" height="2" fill="#ffea99" opacity="0.9" filter="url(#coreBlast)" />
      <rect x="-80" y="-3" width="160" height="2" fill="#ffffff" />
      
      <!-- Left Vertical Cut (Classic Anvil Feature) -->
      <path d="M -150 -8 L -150 70 L -140 70 L -140 -8 Z" fill="#111821" />
      
      <!-- Sharp Bevels & Highlights to define 3D shape -->
      <!-- Left horn dark underbelly -->
      <path d="M -260 0 C -210 25, -160 35, -145 60 L -145 0 Z" fill="rgba(0,0,0,0.4)" />
      
      <!-- Right horn soft highlight -->
      <path d="M 220 0 C 180 20, 160 30, 170 60 L 140 0 Z" fill="rgba(255,255,255,0.05)" />

      <!-- Deep waist shadow -->
      <ellipse cx="0" cy="110" rx="100" ry="25" fill="rgba(0,0,0,0.3)" />

      <!-- Crispy Base Highlights -->
      <line x1="-100" y1="145" x2="100" y2="145" stroke="#708ea8" stroke-width="3" stroke-linecap="round" />
      <line x1="-110" y1="160" x2="110" y2="160" stroke="#4d6275" stroke-width="2" />
      
    </g>

    <!-- Hovering Ground Shadows/Lines underneath Anvil -->
    <line x1="-180" y1="175" x2="-80" y2="175" stroke="#334455" stroke-width="2" stroke-linecap="round" />
    <line x1="80" y1="175" x2="180" y2="175" stroke="#334455" stroke-width="2" stroke-linecap="round" />

  </g>
</svg>

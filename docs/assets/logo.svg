<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c42" />
      <stop offset="100%" stop-color="#f83600" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a" />
  <rect width="512" height="512" rx="112" fill="none" stroke="#222" stroke-width="4" />
  
  <!-- Subtle Ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-dasharray="40 20" />
  
  <!-- Core Anvil / Spark Shape -->
  <g transform="translate(0, -10)">
    <path d="M 170 360 L 342 360 C 362 360 374 340 362 324 L 322 268 C 348 254 366 226 366 192 C 366 144 326 104 278 104 C 262 104 246 110 234 118 C 222 102 204 92 184 92 C 140 92 104 128 104 172 C 104 206 122 236 150 252 L 126 324 C 114 340 126 360 146 360 Z" fill="url(#grad)" filter="url(#glow)" />
    
    <!-- Cutout spark -->
    <path d="M 256 310 C 210 260 216 190 256 150 C 296 190 302 260 256 310 Z" fill="#0a0a0a" />
    <!-- Inner bright dot -->
    <circle cx="256" cy="220" r="14" fill="#ffb480" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#222" />
    </pattern>
    <linearGradient id="fadeGrid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
    <!-- Logo Defs -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c42" />
      <stop offset="100%" stop-color="#f83600" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#fadeGrid)"/>
  
  <!-- Center content group -->
  <g transform="translate(600, 260)">
    
    <!-- Logo Graphic (Scaled to 180x180) -->
    <g transform="translate(-90, -180) scale(0.35)">
      <rect width="512" height="512" rx="112" fill="#111" stroke="#333" stroke-width="4"/>
      <circle cx="256" cy="256" r="170" fill="none" stroke="#222" stroke-width="8" stroke-dasharray="40 20" />
      <g transform="translate(0, -10)">
        <path d="M 170 360 L 342 360 C 362 360 374 340 362 324 L 322 268 C 348 254 366 226 366 192 C 366 144 326 104 278 104 C 262 104 246 110 234 118 C 222 102 204 92 184 92 C 140 92 104 128 104 172 C 104 206 122 236 150 252 L 126 324 C 114 340 126 360 146 360 Z" fill="url(#grad)" filter="url(#glow)" />
        <path d="M 256 310 C 210 260 216 190 256 150 C 296 190 302 260 256 310 Z" fill="#111" />
        <circle cx="256" cy="220" r="14" fill="#ffb480" />
      </g>
    </g>
    
    <!-- Title -->
    <text x="0" y="60" font-family="'Inter', -apple-system, sans-serif" font-weight="700" font-size="80" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2">
      OpenForge
    </text>
    
    <!-- Tagline -->
    <text x="0" y="120" font-family="'Inter', -apple-system, sans-serif" font-weight="500" font-size="28" fill="#888888" text-anchor="middle" letter-spacing="0">
      Open-source AI Agent Builder
    </text>

    <!-- UI Accents / Badges -->
    <g transform="translate(-160, 180)">
      <rect width="100" height="36" rx="18" fill="rgba(255, 107, 43, 0.1)" stroke="rgba(255, 107, 43, 0.2)"/>
      <text x="50" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ff6b2b" text-anchor="middle">MCP Ready</text>
    </g>
    <g transform="translate(-40, 180)">
      <rect width="100" height="36" rx="18" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
      <text x="50" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ccc" text-anchor="middle">Tool Calling</text>
    </g>
    <g transform="translate(80, 180)">
      <rect width="110" height="36" rx="18" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)"/>
      <text x="55" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ccc" text-anchor="middle">Event Streams</text>
    </g>

  </g>
</svg>

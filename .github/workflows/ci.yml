name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Verify CLI
        run: |
          node bin/openforge.js help
          node bin/openforge.js tools

      - name: Verify package exports
        run: |
          node -e "
            const pkg = require('./');
            const { AgentBuilder, AgentRuntime, AgentManifest, AgentLoader, ToolRegistry } = pkg;
            const required = ['AgentBuilder', 'AgentRuntime', 'AgentManifest', 'AgentLoader', 'ToolRegistry'];
            for (const name of required) {
              if (!pkg[name]) { console.error('Missing export: ' + name); process.exit(1); }
            }
            console.log('✅ All exports verified');
          "
